<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MedAI Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 800px;
      padding: 20px 24px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #2a2a3a;
    }

    .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    header h1 { font-size: 18px; font-weight: 600; color: #fff; }
    header span { font-size: 12px; color: #6b7280; margin-left: 4px; }

    #chat {
      flex: 1;
      width: 100%;
      max-width: 800px;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; flex-shrink: 0; margin-top: 2px;
    }

    .msg.user .avatar { background: #4f8ef7; }
    .msg.ai .avatar { background: linear-gradient(135deg, #4f8ef7, #7c3aed); }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .msg.user .bubble {
      background: #4f8ef7;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }

    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #6b7280;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }

    #input-area {
      width: 100%;
      max-width: 800px;
      padding: 16px;
      border-top: 1px solid #2a2a3a;
    }

    .input-box {
      display: flex;
      gap: 10px;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 10px 14px;
      align-items: flex-end;
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: #4b5563; }

    #send-btn {
      background: linear-gradient(135deg, #4f8ef7, #7c3aed);
      border: none;
      border-radius: 10px;
      width: 36px; height: 36px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint { text-align: center; font-size: 11px; color: #374151; margin-top: 8px; }

    .welcome {
      text-align: center; margin: auto;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .welcome .icon { font-size: 48px; }
    .welcome h2 { font-size: 20px; color: #fff; }
    .welcome p { font-size: 14px; color: #6b7280; max-width: 360px; }
  </style>
</head>
<body>

<header>
  <div class="logo">🩺</div>
  <div>
    <h1>MedAI Assistant <span>• llama3.2:3b</span></h1>
  </div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="icon">🧬</div>
    <h2>Assistente Médico IA</h2>
    <p>Tire dúvidas sobre farmacologia, dosagens, protocolos clínicos e prescrições.</p>
  </div>
</div>

<div id="input-area">
  <div class="input-box">
    <textarea id="msg-input" rows="1" placeholder="Pergunte sobre dosagens, protocolos, medicamentos..."></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg width="16" height="16" fill="white" viewBox="0 0 24 24">
        <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
      </svg>
    </button>
  </div>
  <p class="hint">Enter para enviar • Shift+Enter para nova linha</p>
</div>

<script>
  const OLLAMA_URL = "https://ollama-production-aa17.up.railway.app";
  const MODEL = "llama3.2:3b";
  const SYSTEM = `Você é um assistente médico especializado em farmacologia, prescrições e protocolos clínicos brasileiros.
Responda sempre em português brasileiro, de forma técnica mas clara.
Cite doses, vias de administração e contraindicações quando relevante.
Sempre recomende confirmação com diretrizes do CFM para uso clínico real.`;

  const chat = document.getElementById("chat");
  const input = document.getElementById("msg-input");
  const btn = document.getElementById("send-btn");
  const history = [{ role: "system", content: SYSTEM }];

  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });

  function addMsg(role, text) {
    document.getElementById("welcome")?.remove();
    const div = document.createElement("div");
    div.className = `msg ${role === "user" ? "user" : "ai"}`;
    div.innerHTML = `
      <div class="avatar">${role === "user" ? "👤" : "🩺"}</div>
      <div class="bubble" id="bubble-${Date.now()}">${text}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div.querySelector(".bubble");
  }

  function addTyping() {
    document.getElementById("welcome")?.remove();
    const div = document.createElement("div");
    div.className = "msg ai"; div.id = "typing";
    div.innerHTML = `<div class="avatar">🩺</div>
      <div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = ""; input.style.height = "auto"; btn.disabled = true;
    addMsg("user", text);
    history.push({ role: "user", content: text });

    const typing = addTyping();

    try {
      const res = await fetch(`${OLLAMA_URL}/api/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ model: MODEL, messages: history, stream: true })
      });

      typing.remove();
      const bubble = addMsg("ai", "");
      let full = "";

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split("\n").filter(Boolean);
        for (const line of lines) {
          try {
            const json = JSON.parse(line);
            if (json.message?.content) {
              full += json.message.content;
              bubble.textContent = full;
              chat.scrollTop = chat.scrollHeight;
            }
          } catch {}
        }
      }

      history.push({ role: "assistant", content: full });

    } catch (err) {
      typing.remove();
      addMsg("ai", "⚠️ Erro ao conectar com o servidor. Verifique se o modelo foi baixado.");
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
